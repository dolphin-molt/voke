name: Voke
options:
  bundleIdPrefix: com.dolphin
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "14.0"
schemes:
  Voke:
    build:
      targets:
        Voke: all
        VokeTests: [test]
    test:
      targets:
        - VokeTests
targets:
  Voke:
    type: application
    platform: macOS
    sources:
      - Voke
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dolphin.ai-command-controller
        PRODUCT_NAME: Voke
        PRODUCT_MODULE_NAME: Voke
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Voke
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Voke 需要识别和使用你选择的语音输入设备。
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 7
  VokeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - VokeTests
    dependencies:
      - target: Voke
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dolphin.voke.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Voke.app/Contents/MacOS/Voke"
        BUNDLE_LOADER: "$(TEST_HOST)"
